# Full demo: Kafka (KRaft) + a deliberately failing consumer + the DLQ manager.
#
#   cd examples
#   docker compose up --build
#
# Then open http://localhost:8090/api/v1/topics — within ~30s you'll see
# orders.DLT filling up. Group failures:
#   curl localhost:8090/api/v1/topics/orders.DLT/failures
# Dry-run a replay:
#   curl -X POST localhost:8090/api/v1/replay -H 'Content-Type: application/json' \
#     -d '{"dlqTopic":"orders.DLT","messages":[{"partition":0,"offset":0}],"dryRun":true}'

services:
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20

  demo-consumer:
    build:
      context: ..
      dockerfile: examples/demo-failing-consumer/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

  dlq-manager:
    build:
      context: ..
      dockerfile: dlq-manager-server/Dockerfile
    ports:
      - "8090:8090"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy
